#SSA BLUE VORON 2.4
[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[include mainsail.cfg]
# [include beacon.cfg]
[include My_Macros.cfg]
[include ./Demon_Klipper_Essentials_Unified/*.cfg]
[include ./Demon_User_Files/*.cfg]
[include ./Demon_Klipper_Essentials_Unified/Other_Files/Demon_User_Files_Updater/Demon_User_Files_Handler_v*.cfg]
[include config_backup.cfg]
[include Adaptive_Mesh.cfg]
[include ./KAMP_LiTE/*.cfg]
[include Heat_Soak.cfg]
# [include Neopixel_Control.cfg]
[include stealthburner_leds.cfg]
[include btt_sfs.cfg]
[skew_correction]
[exclude_object]
[force_move]
enable_force_move: True
[gcode_arcs]
resolution: 0.1
# [include autotune_tmc.cfg]

####################################################################
#   MCU settings
####################################################################

[mcu]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
serial: /dev/serial/by-id/usb-Klipper_stm32f429xx_2B0023001651313032333432-if00
restart_method: command

[mcu EBB]
canbus_uuid: c39a5f7c0f97 #EBB36 GEN2
# serial:/dev/serial/by-id/usb-Klipper_stm32g0b1xx_1D000A0014504D4D36383520-if00

[mcu cartographer] 
canbus_uuid: 23add6b0c917

####################################################################
#   Caerographer
####################################################################

[cartographer]
mcu: cartographer
x_offset: 0 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 19 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: Yes # For extra output
 
####################################################################
#   Printer settings
####################################################################

[printer]
kinematics: corexy
max_velocity: 700  
max_accel: 4000             #Max 4000
max_z_velocity: 30          #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

#####################################################################
#  TMC AutoTune Settings
####################################################################

[autotune_tmc stepper_x]
motor: ldo-42sth48-2504ac
tuning_goal: performance
sg4_thrs: 100

[autotune_tmc stepper_y]
motor: ldo-42sth48-2504ac
tuning_goal: performance
sg4_thrs: 100

[autotune_tmc stepper_z]
motor: ldo-42sth48-2004ac
tuning_goal: performance

[autotune_tmc stepper_z1]
motor: ldo-42sth48-2004ac
tuning_goal: performance

[autotune_tmc stepper_z2]
motor: ldo-42sth48-2004ac
tuning_goal: performance

[autotune_tmc stepper_z3]
motor: ldo-42sth48-2004ac
tuning_goal: performance

[autotune_tmc extruder]
motor: ldo-36sth20-1004ahg
tuning_goal: silent
toff: 3


#####################################################################
#   X/Y Stepper Settings
#####################################################################

##  B Stepper - Left, Connected to MOTOR_0, Endstop connected to DIAG_0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200  #set to 400 for 0.9 degree stepper
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0
position_endstop: 340
position_max: 340
homing_speed: 60   #Max 100
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC4
interpolate: False #was True
run_current: 1.0
# hold_current: 0.5
sense_resistor: 0.110
diag_pin: ^PG6      # Set to MCU pin connected to TMC DIAG pin
# driver_SGTHRS: 75  # 255 is most sensitive value, 0 is least sensitive
stealthchop_threshold: 0

##  A Stepper - Right, Connected to MOTOR_1, Endstop connected to DIAG_1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200  #set to 400 for 0.9 degree stepper
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: 0
position_endstop: 358
position_max: 358
homing_speed: 60  #Max 100
homing_retract_dist: 0
homing_positive_dir: true

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_y]
uart_pin: PD11
interpolate: False #was True
run_current: 1.0
# hold_current: 0.5
sense_resistor: 0.110
diag_pin: ^PG9      # Set to MCU pin connected to TMC DIAG pin
# driver_SGTHRS: 75   # 255 is most sensitive value, 0 is least sensitive
stealthchop_threshold: 0
 
#####################################################################
#   Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left Connected to MOTOR_2_1 Endstop connected to DIAG_2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop # use CARTO as virtual endstop
homing_retract_dist: 0 # CARTO needs this to be set to 0
position_max: 290
position_min: -5
homing_speed: 8
second_homing_speed: 3

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z]
uart_pin: PC6
interpolate: False #was True
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999

##  Z1 Stepper - Rear Left Connected to MOTOR_3
[stepper_z1]
step_pin: PG4
dir_pin:  !PC1
enable_pin: !PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: False #was True
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999

##  Z2 Stepper - Rear Right Connected to MOTOR_4
[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: False #was True
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999

##  Z3 Stepper - Front Right Connected to MOTOR_5
[stepper_z3]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: False #was True
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999

#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin: EBB: PB14
dir_pin: EBB: PA8
enable_pin: !EBB: PB6
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.69
nozzle_diameter: 0.400
filament_diameter: 1.750
pressure_advance = 0.025
pressure_advance_smooth_time: 0.03 #to be calibrated
max_extrude_only_distance = 150
max_extrude_only_velocity: 120
heater_pin: EBB: PB4
sensor_type: ATC Semitec 104NT-4-R025H42G
pullup_resistor: 2200
sensor_pin: EBB: PA3
min_temp: 0
max_temp: 280
max_power: 1.0
min_extrude_temp: 170
max_extrude_cross_section: 5
#control = pid
#pid_kp = 16.906
#pid_ki = 1.326
#pid_kd = 53.887

[tmc2209 extruder]
uart_pin: EBB: PB3
interpolate: False #was true
run_current: 0.65
# hold_current: 0.100
sense_resistor: 0.11
stealthchop_threshold: 999999

# ######################################################################
# #     input shaper from BTT EBB36
# ######################################################################

