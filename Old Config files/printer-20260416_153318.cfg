######################################################################
#     input shaper from BTT EBB36
######################################################################

[lis2dw]
cs_pin: EBB:PB1
spi_bus: spi2_PB2_PB11_PB10
axes_map: x,y,z

[resonance_tester]
accel_chip: lis2dw
probe_points: 175, 175, 20 

[input_shaper]
shaper_type: mzv

#####################################################################
#   Bed Heater
#####################################################################
[heater_bed]
heater_pin: PA3
sensor_type: Generic 3950
sensor_pin: PF3
max_power: 0.9 ##  Adjust Max Power so your heater doesn't warp your bed. Rule of thumb is 0.4 watts / cm^2 .
min_temp: 10
max_temp: 120

#####################################################################
#   Fan Control
#####################################################################

##  Print Cooling Fan - FAN0 ### or FAN2 on the ebb36 headers ###

[multi_pin part_fans]
pins:EBB:PD3, EBB:PA5

[fan]
pin: multi_pin:part_fans
kick_start_time: 0.1
off_below: 0.10

##  Hotend Fan - FAN1 ### or FAN1 on the ebb36 headers ###
[heater_fan hotend_fan]
pin: EBB: PD2
heater: extruder
max_power: 1.0
kick_start_time: 0.5
heater_temp: 50
fan_speed: 1

##  Controller fan - FAN2
[controller_fan controller_fan]
pin: PD15
kick_start_time: 0.5
heater: heater_bed
stepper: stepper_x, stepper_y, stepper_z, stepper_z1, stepper_z2, stepper_z3, extruder
fan_speed: 0.8

##  Exhaust fan - FAN3
[fan_generic Nevermore]
pin: PA8
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0

##  Exhaust fan - FAN3
# [fan_generic exhaust_fan]
# pin: PD14
#max_power: 1.0
#shutdown_speed: 0.0
#kick_start_time: 5.0
#heater: heater_bed
#heater_temp: 60
#fan_speed: 0.5
# off_below : 0.10

[multi_pin bed_fans]
pins: PD12, PE5

[fan_generic Bed_Fans]
pin: multi_pin:bed_fans
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5
off_below: 0.20

[output_pin DISABLE_BED_FANS]
pin: PG15

#####################################################################
#   Thermals
#####################################################################

[temperature_sensor raspberry_pi]
## Pi temp
sensor_type: temperature_host
max_temp: 90

[temperature_sensor octopus_pro]
#[temperature_sensor mcu_temp]
## Octopus pro temp
sensor_type: temperature_mcu
max_temp: 90

# [temperature_sensor EBB36]
# # BTT EBB36 temp
# sensor_type: temperature_mcu
# sensor_mcu: EBB
# max_temp: 90

[temperature_sensor EBB36]
sensor_type: Generic 3950
sensor_pin: EBB:PA0
pullup_resistor: 2200

[temperature_sensor Chamber_Temp]
sensor_type:EPCOS 100K B57560G104F 
sensor_pin: PF4 
min_temp: 5
max_temp: 70
gcode_id: CH

#####################################################################
#   LED Control
#####################################################################

[led Printer_Lights]
white_pin: PB10
cycle_time: 0.0010
initial_WHITE: 1.0

#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################

[quad_gantry_level]
gantry_corners:
   -60,-10
   410,420
#  Probe points
points:
   50,25
   50,275
   300,275
   300,25
speed: 700
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10

########################################
# Bed mesh calibrate
########################################

[bed_mesh]
speed: 700
horizontal_move_z: 10
mesh_min: 40, 40
mesh_max: 320,310
zero_reference_position: 175,175 #for use with stock z endstop
fade_start: 0.6
fade_end: 10.0
probe_count: 25,25 # Values should be odd, so one point is directly at bed center
algorithm: bicubic

########################################
# Resonance testing
########################################

[resonance_tester]
accel_chip: lis2dw
probe_points:
   175, 175, 20  # an example

[idle_timeout]
gcode:
    _DEMON_IDLE_TIMEOUT
timeout: 3600
[save_variables]
filename = ~/demon_vars.cfg

#######################################################################
# SKEW corection 
#######################################################################
[skew_correction]

#######################################################################
# Firmware_Retraction
#######################################################################

[firmware_retraction]
retract_length: 0.8
retract_speed: 30
unretract_extra_length: 0.0
unretract_speed: 30

