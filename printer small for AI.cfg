#SSA BLUE VORON 2.4
[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[include mainsail.cfg]
[include beacon.cfg]
[include My_Macros.cfg]
[include ./Demon_Klipper_Essentials_Unified/*.cfg]
[include ./Demon_User_Files/*.cfg]
[include ./Demon_Klipper_Essentials_Unified/Other_Files/Demon_User_Files_Updater/Extract_Demon_User_Files_Rpi.cfg]
[include config_backup.cfg]
[include nozzle_scrub.cfg]
[include Adaptive_Mesh.cfg]
[include Voron_Purge.cfg]
[include timelapse.cfg]
[include ./KAMP_LiTE/*.cfg]
[include Heat_Soak.cfg]
#[include macros.cfg]

[exclude_object]

[force_move]
enable_force_move: True

[gcode_arcs]
resolution: 0.1

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f429xx_2B0023001651313032333432-if00
restart_method: command

[mcu EBBCan]
canbus_uuid: 2d3089488c77

[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 4000             
max_z_velocity: 15          
max_z_accel: 350
square_corner_velocity: 5.0

[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 40   #Max 100
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC4
interpolate: false
run_current: 1.0
hold_current: 0.5
sense_resistor: 0.110
diag_pin: ^PG6
driver_SGTHRS: 80
stealthchop_threshold: 0

[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: 0
position_endstop: 355
position_max: 355
homing_speed: 40  #Max 100
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PD11
interpolate: false
run_current: 1.0
hold_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PG9
driver_SGTHRS: 80
 
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0
position_max: 320
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PC6
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_z1]
step_pin: PG4
dir_pin:  !PC1
enable_pin: !PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_z3]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0


[extruder]
step_pin: EBBCan: PD0
dir_pin: EBBCan: PD1
enable_pin: !EBBCan: PD2
microsteps: 16
rotation_distance: 5.586
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
pressure_advance = 0.08
max_extrude_only_distance = 150
max_extrude_only_velocity: 15
heater_pin: EBBCan: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBCan: PA3
min_temp: 10
max_temp: 280
max_power: 1.0
min_extrude_temp: 170 #170
max_extrude_cross_section: 5

[tmc2209 extruder]
uart_pin: EBBCan: PA15
run_current: 0.650
stealthchop_threshold: 999999

[filament_motion_sensor encoder_sensor]
switch_pin: ^PG12
detection_length: 9
extruder: extruder
pause_on_runout: False
insert_gcode:
    { action_respond_info("Filament Encoder is Running") }
runout_gcode:
    { action_respond_info("Filament Encoder Stall Detected") }
    {% if printer.print_stats.state == "printing" %}
      _FIL_CHANGE_PARK
    {% endif %}

[adxl345]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: x,y,z

#[input_shaper]
#shaper_freq_x: 54.6
#shaper_type_x: zv
#shaper_freq_y: 39.0
#shaper_type_y: zv

[heater_bed]
heater_pin: PA3
sensor_type: Generic 3950
sensor_pin: PF3
max_power: 0.8
min_temp: 10
max_temp: 120

[fan]
pin: EBBCan: PA1
kick_start_time: 0.1
off_below: 0.10

[heater_fan hotend_fan]
pin: EBBCan: PA0
heater: extruder
max_power: 1.0
kick_start_time: 0.5
heater_temp: 50
fan_speed: 1.0

[controller_fan controller_fan]
pin: PD15
kick_start_time: 0.5
heater: heater_bed
stepper: stepper_x, stepper_y, stepper_z, stepper_z1, stepper_z2, stepper_z3, extruder
fan_speed: 0.8

[fan_generic Nevermore]
pin: PA8
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0

[multi_pin bed_fans]
pins: PD12, PE5

[fan_generic Bed_Fans]
pin: multi_pin:bed_fans
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5
off_below: 0.20

[output_pin DISABLE_BED_FANS]
pin: PG15

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
max_temp: 90

[temperature_sensor octopus_pro]
sensor_type: temperature_mcu
max_temp: 90

[temperature_sensor EBB36]
sensor_type: temperature_mcu
sensor_mcu: EBBCan
max_temp: 90

[temperature_sensor Chamber_Temp]
sensor_type:EPCOS 100K B57560G104F 
sensor_pin: PF4 
min_temp: 5
max_temp: 70
gcode_id: CH

[led Printer_Lights]
white_pin: PB10
cycle_time: 0.0010
initial_WHITE: 1.0

[quad_gantry_level]
gantry_corners:
   -60,-10
   410,420
#  Probe points
points:
   50,25
   50,275
   300,275
   300,25
speed: 700
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10

[bed_mesh]
speed: 700
horizontal_move_z: 10
mesh_min: 40, 40
mesh_max: 320,310
zero_reference_position: 175,175
fade_start: 0.6
fade_end: 10.0
probe_count: 25,25
algorithm: bicubic

[resonance_tester]
accel_chip: adxl345
probe_points:
    100, 100, 20  

[idle_timeout]
gcode:
    _DEMON_IDLE_TIMEOUT
timeout: 3600
[save_variables]
filename = ~/demon_vars.cfg

